<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FBX Viewer</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: transparent; overflow: hidden; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }
    #status {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 22, 0.78);
      color: #eaeaea;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 8px 12px;
      font: 500 12px/1.2 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      letter-spacing: .2px;
      z-index: 10;
      pointer-events: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: opacity 400ms ease;
    }
    #status.hide { opacity: 0; }

    #spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.16);
      border-top-color: #ffffff;
      animation: spin 900ms linear infinite;
      opacity: 0;
      transition: opacity 300ms ease, transform 300ms ease;
      pointer-events: none;
      z-index: 9;
    }
    #spinner.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .viewer-canvas {
      opacity: 0;
      filter: blur(16px);
      transition: opacity 600ms ease, filter 900ms ease;
    }
    .viewer-canvas.ready {
      opacity: 1;
      filter: blur(0);
    }

    #controls {
      position: absolute;
      top: 10px;
      left: 12px;
      display: flex;
      gap: 6px;
      z-index: 10;
      font: 500 11px/1 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      letter-spacing: .2px;
    }
    #controls button {
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(20,20,22,0.82);
      color: #f9f9f9;
      padding: 6px 10px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: background 200ms ease, transform 150ms ease, border-color 200ms ease, opacity 200ms ease;
      opacity: 0.9;
    }
    #controls button span.dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #4ade80;
    }
    #controls button.off span.dot {
      background: #9ca3af;
    }
    #controls button.off {
      opacity: 0.6;
    }
    #controls button:hover {
      background: rgba(35,35,38,0.95);
      transform: translateY(-1px);
    }
    #controls .mode-btn {
      padding: 4px 7px;
      min-width: 26px;
      justify-content: center;
    }
    #controls .label {
      font-size: 10px;
    }
    .icon-wire,
    .icon-tex,
    .icon-clay {
      display: inline-block;
    }
    .icon-wire {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.3);
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.25) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.25) 1px, transparent 1px);
      background-size: 4px 4px;
    }
    .icon-tex {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      background: linear-gradient(135deg, #60a5fa, #ec4899, #f59e0b);
    }
    .icon-clay {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #ffffff, #e5e7eb 35%, #6b7280 100%);
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="status">Preparing viewer…</div>
  <div id="spinner" class="show"></div>
  <script type="module">
    import * as THREE from 'three';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const params = new URLSearchParams(location.search);
    const src = params.get('src') || 'assets/iron.glb';

    const container = document.getElementById('app');
    const status = document.getElementById('status');
    const spinner = document.getElementById('spinner');
    const setStatus = (t) => { if (status) status.textContent = t; };
    const hideStatus = () => { if (status) status.classList.add('hide'); };
    const scene = new THREE.Scene();
    scene.background = null;
    const shadedMeshes = [];

    const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 2000);
    camera.position.set(0, 1.5, 4);
    camera.position.set(0, 1.5, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.physicallyCorrectLights = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.domElement.classList.add('viewer-canvas');
    container.appendChild(renderer.domElement);

    // Lighting rig: soft studio
    const hemi = new THREE.HemisphereLight(0xffffff, 0x202020, 0.8);
    scene.add(hemi);
    const key = new THREE.DirectionalLight(0xffffff, 2.2);
    key.position.set(4, 6, 8);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xffffff, 0.9);
    fill.position.set(-6, 3, -4);
    scene.add(fill);
    const rim = new THREE.DirectionalLight(0xffffff, 0.7);
    rim.position.set(-2, 5, 10);
    scene.add(rim);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.14;
    controls.enablePan = false;
    controls.rotateSpeed = 1.0;
    controls.zoomSpeed = 0.9;
    controls.target.set(0, 1, 0);
    controls.autoRotate = true;
    controls.autoRotateSpeed = 4.0; // ~360° every 15s (60 / speed)

    // Loading manager for status text
    const manager = new THREE.LoadingManager();
    manager.onStart = (url, itemsLoaded, itemsTotal) => setStatus(`Starting: ${url}`);
    manager.onProgress = (url, itemsLoaded, itemsTotal) => {
      setStatus(`Loading ${itemsLoaded}/${itemsTotal}…`);
    };
    manager.onLoad = () => setStatus(`Processing scene…`);
    manager.onError = (url) => setStatus(`Error loading: ${url}`);

    const fbxLoader = new FBXLoader(manager);
    const gltfLoader = new GLTFLoader(manager);
    const fileLoader = new THREE.FileLoader(manager);
    fileLoader.setResponseType('arraybuffer');

    function processObject(obj) {
      if (!obj) {
        setStatus('No geometry found in file.');
        return;
      }

      obj.traverse((c) => {
        if (!c.isMesh) return;
        c.castShadow = false;
        c.receiveShadow = false;
        shadedMeshes.push(c);

        let baseMat = c.material || new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
        let baseColor = (baseMat && baseMat.color) ? baseMat.color.clone() : new THREE.Color(0xaaaaaa);

        // Normalize "texture" material for an even glossier, near–polished shine
        if (baseMat.isMeshStandardMaterial) {
          baseMat.metalness = 0.8;
          baseMat.roughness = 0.18;
          baseMat.envMap = null;
          baseMat.envMapIntensity = 0.0;
          baseMat.needsUpdate = true;
        } else {
          // Re-wrap into a MeshStandardMaterial, preserving basic texture maps
          const texMap    = baseMat.map || null;
          const normalMap = baseMat.normalMap || null;
          baseMat = new THREE.MeshStandardMaterial({
            color: baseColor,
            map: texMap,
            normalMap: normalMap,
            metalness: 0.8,
            roughness: 0.18
          });
        }

        const texMat = baseMat;

        // Clay material (default)
        const clayMat = new THREE.MeshStandardMaterial({
          color: baseColor,
          metalness: 0.1,
          roughness: 0.55
        });

        // Wire lines as separate LineSegments overlay so base stays solid
        const wireGeom = new THREE.WireframeGeometry(c.geometry);
        const wireMat = new THREE.LineBasicMaterial({
          color: 0xbfc5d0,
          transparent: true,
          opacity: 0.4,
          depthTest: true,
          depthWrite: false
        });
        const wireLines = new THREE.LineSegments(wireGeom, wireMat);
        wireLines.visible = false;
        c.add(wireLines);

        c.userData._tex = texMat;
        c.userData._clay = clayMat;
        c.userData._wireLines = wireLines;

        c.material = clayMat;
      });
      scene.add(obj);

      // Frame the model
      const box = new THREE.Box3().setFromObject(obj);
      const sizeVec = box.getSize(new THREE.Vector3());
      const size = sizeVec.length();
      const center = box.getCenter(new THREE.Vector3());
      controls.target.copy(center);
      const fitDist = size * 0.9 / Math.tan((camera.fov * Math.PI) / 360);
      camera.position.copy(center).add(new THREE.Vector3(0, size * 0.18, -fitDist * 0.7));
      camera.near = Math.max(0.1, size / 500);
      camera.far = Math.max(2000, size * 10);
      camera.updateProjectionMatrix();

      // Soft ground shadow
      const shadowSize = size * 0.9;
      const shadowCanvas = document.createElement('canvas');
      shadowCanvas.width = shadowCanvas.height = 256;
      const sctx = shadowCanvas.getContext('2d');
      const g = sctx.createRadialGradient(128,128,0,128,128,128);
      g.addColorStop(0, 'rgba(0,0,0,0.28)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      sctx.fillStyle = g;
      sctx.fillRect(0,0,256,256);
      const shadowTex = new THREE.CanvasTexture(shadowCanvas);
      shadowTex.flipY = false;
      const shadowMat = new THREE.MeshBasicMaterial({
        map: shadowTex,
        transparent: true,
        depthWrite: false
      });
      const shadowGeo = new THREE.PlaneGeometry(shadowSize, shadowSize);
      const shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
      shadowMesh.rotation.x = -Math.PI / 2;
      shadowMesh.position.set(center.x, box.min.y + 0.01, center.z);
      shadowMesh.renderOrder = -10;
      scene.add(shadowMesh);

      setStatus(`Loaded ✓`);
      if (spinner) spinner.classList.remove('show');
      renderer.domElement.classList.add('ready');
      setTimeout(hideStatus, 600);
    }

    function loadModel(url) {
      setStatus(`Requesting ${url}…`);

      if (/\.fbx(\?|$)/i.test(url)) {
        fileLoader.load(url, (buffer) => {
          setStatus(`Parsing model…`);
          let obj;
          try {
            obj = fbxLoader.parse(buffer, url);
          } catch (e) {
            console.error('FBX parse error:', e);
            setStatus('Parse error: FBX not supported or corrupted.');
            return;
          }
          processObject(obj);
        }, (evt) => {
          if (evt && evt.lengthComputable) {
            const pct = Math.min(100, Math.round((evt.loaded / evt.total) * 100));
            setStatus(`Downloading… ${pct}%`);
          } else {
            setStatus(`Downloading…`);
          }
        }, (err) => {
          console.error('FBX load error:', err);
          const a = document.createElement('a'); a.href = url;
          setStatus(`Failed to load file.\nURL: ${a.href}`);
        });
      } else if (/\.(glb|gltf)(\?|$)/i.test(url)) {
        gltfLoader.load(url, (gltf) => {
          processObject(gltf.scene || gltf.scenes?.[0]);
        }, (evt) => {
          if (evt && evt.lengthComputable) {
            const pct = Math.min(100, Math.round((evt.loaded / evt.total) * 100));
            setStatus(`Downloading… ${pct}%`);
          } else {
            setStatus(`Downloading…`);
          }
        }, (err) => {
          console.error('GLTF load error:', err);
          const a = document.createElement('a'); a.href = url;
          setStatus(`Failed to load file.\nURL: ${a.href}`);
        });
      } else {
        const a = document.createElement('a'); a.href = url;
        setStatus(`Unsupported model format.\nURL: ${a.href}`);
      }
    }

    loadModel(src);

    function resize() {
      const w = container.clientWidth || window.innerWidth;
      const h = container.clientHeight || window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h, false);
    }
    window.addEventListener('resize', resize);
    resize();

    const controlsHost = document.createElement('div');
    controlsHost.id = 'controls';
    const autoBtn = document.createElement('button');
    autoBtn.innerHTML = '<span class="dot"></span><span class="label">Auto</span>';
    const wireBtn = document.createElement('button');
    wireBtn.classList.add('mode-btn');
    wireBtn.dataset.mode = 'wire';
    wireBtn.innerHTML = '<span class="icon-wire"></span>';
    const texBtn = document.createElement('button');
    texBtn.classList.add('mode-btn');
    texBtn.dataset.mode = 'tex';
    texBtn.innerHTML = '<span class="icon-tex"></span>';
    const matBtn = document.createElement('button');
    matBtn.classList.add('mode-btn');
    matBtn.dataset.mode = 'clay';
    matBtn.innerHTML = '<span class="icon-clay"></span>';
    controlsHost.appendChild(autoBtn);
    controlsHost.appendChild(wireBtn);
    controlsHost.appendChild(texBtn);
    controlsHost.appendChild(matBtn);
    container.appendChild(controlsHost);

    let autoOn = true;
    autoBtn.addEventListener('click', () => {
      autoOn = !autoOn;
      controls.autoRotate = autoOn;
      autoBtn.classList.toggle('off', !autoOn);
    });

    let currentMode = 'clay';
    function applyMode(mode) {
      currentMode = mode;
      const buttons = [wireBtn, texBtn, matBtn];
      buttons.forEach(btn => {
        const isActive = btn.dataset.mode === mode;
        btn.classList.toggle('off', !isActive);
      });
      if (!shadedMeshes.length) return;

      shadedMeshes.forEach(m => {
        const ud = m.userData;
        const clay = ud._clay;
        const tex = ud._tex;
        const wireLines = ud._wireLines;

        if (wireLines) wireLines.visible = false;

        if (mode === 'wire' && clay) {
          m.material = clay;
          if (wireLines) wireLines.visible = true;
        } else if (mode === 'tex' && tex) {
          m.material = tex;
        } else if (mode === 'clay' && clay) {
          m.material = clay;
        }
      });
    }

    wireBtn.addEventListener('click', () => applyMode('wire'));
    texBtn.addEventListener('click', () => applyMode('tex'));
    matBtn.addEventListener('click', () => applyMode('clay'));

    let isPointerDown = false;
    renderer.domElement.addEventListener('pointerdown', () => {
      isPointerDown = true;
      controls.rotateSpeed = 1.6;
    });
    window.addEventListener('pointerup', () => {
      if (!isPointerDown) return;
      isPointerDown = false;
      controls.rotateSpeed = 1.0;
    });

    let lastTime = performance.now();
    function tick(now) {
      const dt = Math.min(0.05, (now - lastTime) / 1000);
      lastTime = now;
      controls.update(dt);
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  </script>
</body>
</html>
