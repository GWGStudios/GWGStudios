<!DOCTYPE html>
<html lang="en">
<head>

  <title>3D World - GWG Studios</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              black: '#0a0a0a',
              dark: '#1a1a1a',
              gray: '#808080',
              light: '#e5e5e5',
              white: '#ffffff',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-[#111111] text-brand-white min-h-screen">
  <nav class="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 px-5 py-1 flex justify-between items-center rounded-full backdrop-blur-md bg-white/10 border border-white/20 shadow-xl w-[92vw] sm:w-[86vw] md:w-[72vw] lg:w-[64vw] max-w-5xl transition-all duration-300">
    <div class="h-8 md:h-10">
      <img src="assets/gwg-logo.gif" alt="GWG Logo" class="h-full object-contain">
    </div>
    <div id="main-nav-links" class="hidden md:flex relative space-x-8 text-sm uppercase tracking-widest">
      <a href="index.html" class="nav-link hover:text-brand-gray transition-colors">Home</a>
      <a href="graphic-world.html" class="nav-link hover:text-brand-gray transition-colors">Graphic World</a>
      <a href="3d-world.html" class="nav-link hover:text-brand-gray transition-colors nav-link-active">3D World</a>
    </div>
    <button class="md:hidden text-white">Menu</button>
  </nav>
  <div id="mobile-nav-panel" class="mobile-menu-panel" style="top: 80px;">
    <div class="mobile-menu-list md:hidden">
      <a href="index.html" class="hover:text-white transition">Home</a>
      <a href="graphic-world.html" class="hover:text-white transition">Graphic World</a>
      <a href="3d-world.html" class="hover:text-white transition">3D World</a>
    </div>
  </div>
  <header class="relative h-screen w-full flex items-center justify-center overflow-hidden">
    <div class="absolute inset-0 z-0 overflow-hidden">
      <video class="w-full h-full object-cover" autoplay muted playsinline loop preload="metadata" poster="assets/anyma2.mp4">
        <source src="assets/anyma2.mp4" type="video/mp4">
      </video>
    </div>
    <div class="absolute inset-0"></div>
    <div class="relative z-10 text-center mix-blend-difference">
      <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter mb-4">3D World</h1>
      <p class="text-xl md:text-2xl font-light text-brand-gray tracking-wide">Rendered motion, materials, and light</p>
    </div>
  </header>

  <section class="relative py-20 px-6 bg-[#111111]">
    <div class="max-w-[1200px] mx-auto">
      <h2 class="text-4xl md:text-6xl font-bold text-[#f5f5f7] tracking-tight mb-8">Featured 3D Works</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="rounded-2xl overflow-hidden bg-[#0b0b0b]/90 border border-white/10">
          <video class="w-full h-56 object-cover" autoplay muted loop playsinline>
            <source src="assets/Anyma.mp4" type="video/mp4">
          </video>
          <div class="p-5">
            <h3 class="text-lg font-semibold mb-1">Anyma</h3>
            <p class="text-sm text-brand-gray">Material study and lighting motion.</p>
          </div>
        </div>
        <div class="rounded-2xl overflow-hidden bg-[#0b0b0b]/90 border border-white/10">
          <video class="w-full h-56 object-cover" autoplay muted loop playsinline>
            <source src="graphis%202d/0067.mp4" type="video/mp4">
          </video>
          <div class="p-5">
            <h3 class="text-lg font-semibold mb-1">3D realism</h3>
            <p class="text-sm text-brand-gray">Cinematic motion with smooth transitions.</p>
          </div>
        </div>
        <div class="rounded-2xl overflow-hidden bg-[#0b0b0b]/90 border border-white/10">
          <video class="w-full h-56 object-cover" autoplay muted loop playsinline>
            <source src="assets/3.blend0488.mp4" type="video/mp4">
          </video>
          <div class="p-5">
            <h3 class="text-lg font-semibold mb-1">Product visualization</h3>
            <p class="text-sm text-brand-gray">Hard-surface detail and reflective materials.</p>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
  <script src="main.js"></script>
